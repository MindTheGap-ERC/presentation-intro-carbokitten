<?xml version="1.0" standalone="no" ?>
<svg viewBox="-5 -5 390 280" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<style>


#background {
    fill: white;
}

#arrow {
    fill: rgb(50, 100, 160);
}

.edge {
    stroke-width: 2pt;
    fill: none;
    stroke: rgb(50, 100, 160);
}

.node rect {
    fill: white;
    stroke: black;
}

.node text {
    fill: black;
    text-anchor: middle;
    dominant-baseline: middle;
}

.shadow-box {
    fill: #eee;
}

.state .top-state-box {
    fill: rgb(230, 220, 170);
    stroke: none;
}

.state text {
    fill: black;
    text-anchor: middle;
    dominant-baseline: middle;
}

</style>
<defs>
